<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="./style.css">
    <title>Plus To Infinite</title>
</head>

<body>
    <div class="ALL">
            <h1 id="MoneyDisplay" class="StandardComponent">0</h1>
        
            <button id="button" class="StandardComponent"><div class="cross"></div><div id="IncrementalValue">+1</div></button>

        <div id="AdditionPart"  class="StandardComponent">
                <h1>Click Power</h1>
                <h3 id="AdditionCost">cost: 10</h3>
                <h4 id="AdditionLvl">lvl 0</h4>
            <button id="AdditionUpgrade">upgrade: +1 /click</button>
        </div>

        <div id="MultiplicationPart"  class="StandardComponent">
                <h1>Multiplier</h1>
                <h3 id="MultiplierCost">cost: 1 K</h3>
                <h4 id="MultiplierLvl">lvl 0</h4>
            <button id="MultiplicationUpgrade">upgrade: x2 /click</button>
        </div>

        <div id="AutomationPart"  class="StandardComponent">
                <h1>Automation</h1>
                <h3 id="AutomationCost">cost: 100</h3>
                <h4 id="AutomationLvl">lvl 0</h4>
            <button id="AutomationUpgrade">upgrade: +0 /1s</button>
            <div class="BarContainer">
                <div class="Bar"></div>
            </div>
        </div>
    </div>


    <script src="./script.js"></script>
</body>

</html>
