<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="./style.css">
    <title>Plus To Infinite</title>
</head>

<body>
    <svg id="bg" xmlns="http://www.w3.org/2000/svg" 
  style="position:fixed;top:0;left:0;width:100vw;height:100vh;z-index:0;pointer-events:none;" 
  viewBox="0 0 680 420" 
  preserveAspectRatio="xMidYMid slice">
        <style>
            @keyframes pulse1 {

                0%,
                100% {
                    opacity: 0.15
                }

                50% {
                    opacity: 0.55
                }
            }

            @keyframes pulse2 {

                0%,
                100% {
                    opacity: 0.08
                }

                50% {
                    opacity: 0.4
                }
            }

            @keyframes pulse3 {

                0%,
                100% {
                    opacity: 0.3
                }

                50% {
                    opacity: 0.9
                }
            }

            @keyframes flow1 {
                0% {
                    stroke-dashoffset: 120
                }

                100% {
                    stroke-dashoffset: 0
                }
            }

            @keyframes flow2 {
                0% {
                    stroke-dashoffset: 80
                }

                100% {
                    stroke-dashoffset: 0
                }
            }

            @keyframes scanline {
                0% {
                    transform: translateY(-20px)
                }

                100% {
                    transform: translateY(440px)
                }
            }

            @keyframes blink {

                0%,
                100% {
                    opacity: 1
                }

                45%,
                55% {
                    opacity: 0.1
                }
            }
        </style>
        <rect width="680" height="420" fill="#0a1628" />
        <rect width="680" height="420" fill="url(#vignette)" />
        <defs>
            <radialGradient id="vignette" cx="50%" cy="50%" r="70%">
                <stop offset="0%" stop-color="#0d2040" stop-opacity="0" />
                <stop offset="100%" stop-color="#020810" stop-opacity="0.8" />
            </radialGradient>
            <radialGradient id="glow1" cx="50%" cy="50%" r="50%">
                <stop offset="0%" stop-color="#38bdf8" stop-opacity="0.18" />
                <stop offset="100%" stop-color="#38bdf8" stop-opacity="0" />
            </radialGradient>
            <radialGradient id="glow2" cx="50%" cy="50%" r="50%">
                <stop offset="0%" stop-color="#7dd3fc" stop-opacity="0.12" />
                <stop offset="100%" stop-color="#7dd3fc" stop-opacity="0" />
            </radialGradient>
        </defs>
        <g opacity="0.18">
            <line x1="0" y1="30" x2="680" y2="30" stroke="#38bdf8" stroke-width="0.4" />
            <line x1="0" y1="60" x2="680" y2="60" stroke="#38bdf8" stroke-width="0.4" />
            <line x1="0" y1="90" x2="680" y2="90" stroke="#38bdf8" stroke-width="0.4" />
            <line x1="0" y1="120" x2="680" y2="120" stroke="#38bdf8" stroke-width="0.4" />
            <line x1="0" y1="150" x2="680" y2="150" stroke="#38bdf8" stroke-width="0.4" />
            <line x1="0" y1="180" x2="680" y2="180" stroke="#38bdf8" stroke-width="0.4" />
            <line x1="0" y1="210" x2="680" y2="210" stroke="#38bdf8" stroke-width="0.4" />
            <line x1="0" y1="240" x2="680" y2="240" stroke="#38bdf8" stroke-width="0.4" />
            <line x1="0" y1="270" x2="680" y2="270" stroke="#38bdf8" stroke-width="0.4" />
            <line x1="0" y1="300" x2="680" y2="300" stroke="#38bdf8" stroke-width="0.4" />
            <line x1="0" y1="330" x2="680" y2="330" stroke="#38bdf8" stroke-width="0.4" />
            <line x1="0" y1="360" x2="680" y2="360" stroke="#38bdf8" stroke-width="0.4" />
            <line x1="0" y1="390" x2="680" y2="390" stroke="#38bdf8" stroke-width="0.4" />
            <line x1="0" y1="420" x2="680" y2="420" stroke="#38bdf8" stroke-width="0.4" />
            <line x1="30" y1="0" x2="30" y2="420" stroke="#38bdf8" stroke-width="0.4" />
            <line x1="60" y1="0" x2="60" y2="420" stroke="#38bdf8" stroke-width="0.4" />
            <line x1="90" y1="0" x2="90" y2="420" stroke="#38bdf8" stroke-width="0.4" />
            <line x1="120" y1="0" x2="120" y2="420" stroke="#38bdf8" stroke-width="0.4" />
            <line x1="150" y1="0" x2="150" y2="420" stroke="#38bdf8" stroke-width="0.4" />
            <line x1="180" y1="0" x2="180" y2="420" stroke="#38bdf8" stroke-width="0.4" />
            <line x1="210" y1="0" x2="210" y2="420" stroke="#38bdf8" stroke-width="0.4" />
            <line x1="240" y1="0" x2="240" y2="420" stroke="#38bdf8" stroke-width="0.4" />
            <line x1="270" y1="0" x2="270" y2="420" stroke="#38bdf8" stroke-width="0.4" />
            <line x1="300" y1="0" x2="300" y2="420" stroke="#38bdf8" stroke-width="0.4" />
            <line x1="330" y1="0" x2="330" y2="420" stroke="#38bdf8" stroke-width="0.4" />
            <line x1="360" y1="0" x2="360" y2="420" stroke="#38bdf8" stroke-width="0.4" />
            <line x1="390" y1="0" x2="390" y2="420" stroke="#38bdf8" stroke-width="0.4" />
            <line x1="420" y1="0" x2="420" y2="420" stroke="#38bdf8" stroke-width="0.4" />
            <line x1="450" y1="0" x2="450" y2="420" stroke="#38bdf8" stroke-width="0.4" />
            <line x1="480" y1="0" x2="480" y2="420" stroke="#38bdf8" stroke-width="0.4" />
            <line x1="510" y1="0" x2="510" y2="420" stroke="#38bdf8" stroke-width="0.4" />
            <line x1="540" y1="0" x2="540" y2="420" stroke="#38bdf8" stroke-width="0.4" />
            <line x1="570" y1="0" x2="570" y2="420" stroke="#38bdf8" stroke-width="0.4" />
            <line x1="600" y1="0" x2="600" y2="420" stroke="#38bdf8" stroke-width="0.4" />
            <line x1="630" y1="0" x2="630" y2="420" stroke="#38bdf8" stroke-width="0.4" />
            <line x1="660" y1="0" x2="660" y2="420" stroke="#38bdf8" stroke-width="0.4" />
        </g>
        <ellipse cx="340" cy="210" rx="280" ry="180" fill="url(#glow1)"
            style="animation:pulse2 4s ease-in-out infinite" />
        <ellipse cx="120" cy="80" rx="120" ry="90" fill="url(#glow2)"
            style="animation:pulse1 6s ease-in-out infinite 1s" />
        <ellipse cx="560" cy="340" rx="100" ry="80" fill="url(#glow2)"
            style="animation:pulse1 5s ease-in-out infinite 2s" />
        <g fill="none">
            <path d="M60 210 L120 210 L120 150 L200 150 L200 90 L300 90" stroke="#38bdf8" stroke-width="1.5"
                stroke-dasharray="6 3" style="animation:flow1 3s linear infinite" opacity="0.7" />
            <circle cx="120" cy="210" r="3" fill="#38bdf8" opacity="0.9" />
            <circle cx="120" cy="150" r="3" fill="#38bdf8" opacity="0.9" />
            <circle cx="200" cy="150" r="3" fill="#38bdf8" opacity="0.9" />
            <circle cx="200" cy="90" r="3" fill="#38bdf8" opacity="0.9" />
            <path d="M620 300 L560 300 L560 240 L480 240 L480 180 L400 180" stroke="#38bdf8" stroke-width="1.5"
                stroke-dasharray="6 3" style="animation:flow2 2.5s linear infinite" opacity="0.7" />
            <circle cx="560" cy="300" r="3" fill="#38bdf8" opacity="0.9" />
            <circle cx="560" cy="240" r="3" fill="#38bdf8" opacity="0.9" />
            <circle cx="480" cy="240" r="3" fill="#38bdf8" opacity="0.9" />
            <circle cx="480" cy="180" r="3" fill="#38bdf8" opacity="0.9" />
            <path d="M340 390 L340 330 L280 330 L280 270 L220 270 L220 330 L160 330" stroke="#0ea5e9" stroke-width="1"
                stroke-dasharray="4 4" style="animation:flow1 4s linear infinite 0.5s" opacity="0.5" />
            <circle cx="340" cy="330" r="2.5" fill="#0ea5e9" opacity="0.8" />
            <circle cx="280" cy="330" r="2.5" fill="#0ea5e9" opacity="0.8" />
            <circle cx="280" cy="270" r="2.5" fill="#0ea5e9" opacity="0.8" />
            <circle cx="220" cy="270" r="2.5" fill="#0ea5e9" opacity="0.8" />
            <path d="M340 30 L340 90 L400 90 L400 150 L460 150 L460 90 L520 90" stroke="#0ea5e9" stroke-width="1"
                stroke-dasharray="4 4" style="animation:flow2 3.5s linear infinite 1s" opacity="0.5" />
            <circle cx="340" cy="90" r="2.5" fill="#0ea5e9" opacity="0.8" />
            <circle cx="400" cy="90" r="2.5" fill="#0ea5e9" opacity="0.8" />
            <circle cx="400" cy="150" r="2.5" fill="#0ea5e9" opacity="0.8" />
            <circle cx="460" cy="150" r="2.5" fill="#0ea5e9" opacity="0.8" />
        </g>
        <g fill="none" stroke="#38bdf8">
            <rect x="300" y="170" width="80" height="80" rx="4" stroke-width="1" opacity="0.5"
                style="animation:pulse2 5s ease-in-out infinite" />
            <rect x="310" y="180" width="60" height="60" rx="2" stroke-width="0.5" opacity="0.4" />
            <line x1="340" y1="170" x2="340" y2="250" stroke-width="0.5" opacity="0.3" />
            <line x1="300" y1="210" x2="380" y2="210" stroke-width="0.5" opacity="0.3" />
            <circle cx="340" cy="210" r="15" stroke-width="1.5" opacity="0.7"
                style="animation:pulse3 2s ease-in-out infinite" />
            <circle cx="340" cy="210" r="8" stroke-width="1" opacity="0.5" />
            <circle cx="340" cy="210" r="3" fill="#38bdf8" opacity="0.9"
                style="animation:blink 2s ease-in-out infinite" />
        </g>
        <g fill="none" stroke="#1e40af">
            <rect x="80" y="290" width="60" height="40" rx="2" stroke-width="0.8" opacity="0.6" />
            <line x1="80" y1="305" x2="140" y2="305" stroke-width="0.4" opacity="0.5" />
            <line x1="80" y1="320" x2="140" y2="320" stroke-width="0.4" opacity="0.5" />
            <line x1="100" y1="290" x2="100" y2="330" stroke-width="0.4" opacity="0.5" />
            <line x1="120" y1="290" x2="120" y2="330" stroke-width="0.4" opacity="0.5" />
        </g>
        <g fill="none" stroke="#1e40af">
            <rect x="540" y="90" width="60" height="40" rx="2" stroke-width="0.8" opacity="0.6" />
            <line x1="540" y1="105" x2="600" y2="105" stroke-width="0.4" opacity="0.5" />
            <line x1="540" y1="120" x2="600" y2="120" stroke-width="0.4" opacity="0.5" />
            <line x1="560" y1="90" x2="560" y2="130" stroke-width="0.4" opacity="0.5" />
            <line x1="580" y1="90" x2="580" y2="130" stroke-width="0.4" opacity="0.5" />
        </g>
        <g opacity="0.6">
            <circle cx="60" cy="60" r="2" fill="#38bdf8" style="animation:blink 1.7s ease-in-out infinite" />
            <circle cx="180" cy="300" r="2" fill="#38bdf8" style="animation:blink 2.3s ease-in-out infinite 0.4s" />
            <circle cx="500" cy="60" r="2" fill="#7dd3fc" style="animation:blink 1.9s ease-in-out infinite 0.8s" />
            <circle cx="620" cy="360" r="2" fill="#38bdf8" style="animation:blink 2.5s ease-in-out infinite 1.2s" />
            <circle cx="420" cy="360" r="1.5" fill="#7dd3fc" style="animation:blink 2.1s ease-in-out infinite 0.3s" />
            <circle cx="90" cy="180" r="1.5" fill="#38bdf8" style="animation:blink 1.8s ease-in-out infinite 1s" />
        </g>
        <g opacity="0.12" fill="none" stroke="#38bdf8" stroke-width="0.5">
            <polygon points="150,360 180,310 210,360" />
            <polygon points="460,30 490,75 430,75" />
            <polygon points="620,160 650,110 680,160" />
            <polygon points="20,100 50,55 80,100" />
        </g>
        <rect x="0" y="0" width="680" height="3" fill="#38bdf8" opacity="0.3" />
        <rect x="0" y="417" width="680" height="3" fill="#38bdf8" opacity="0.3" />
        <rect x="0" y="0" width="3" height="420" fill="#38bdf8" opacity="0.3" />
        <rect x="677" y="0" width="3" height="420" fill="#38bdf8" opacity="0.3" />
        <rect x="0" y="0" width="12" height="12" fill="#38bdf8" opacity="0.6" />
        <rect x="668" y="0" width="12" height="12" fill="#38bdf8" opacity="0.6" />
        <rect x="0" y="408" width="12" height="12" fill="#38bdf8" opacity="0.6" />
        <rect x="668" y="408" width="12" height="12" fill="#38bdf8" opacity="0.6" />
    </svg>

    <div class="ALL">
        <h1 id="MoneyDisplay" class="StandardComponent">0</h1>

        <button id="button" class="StandardComponent">
            <div class="cross"></div>
            <div id="IncrementalValue">+1</div>
        </button>

        <div id="AdditionPart" class="StandardComponent">
            <h1>Click Power</h1>
            <h3 id="AdditionCost">cost: 15</h3>
            <h4 id="AdditionLvl">lvl 0</h4>
            <button id="AdditionUpgrade">upgrade: +1 /click</button>
        </div>

        <div id="MultiplicationPart" class="StandardComponent">
            <h1>Multiplier</h1>
            <h3 id="MultiplierCost">cost: 500</h3>
            <h4 id="MultiplierLvl">lvl 0</h4>
            <button id="MultiplicationUpgrade">upgrade: x2 /click</button>
        </div>

        <div id="AutomationPart" class="StandardComponent">
            <h1>Automation</h1>
            <h3 id="AutomationCost">cost: 200</h3>
            <h4 id="AutomationLvl">lvl 0</h4>
            <button id="AutomationUpgrade">upgrade: +0 /1s</button>
            <div class="BarContainer">
                <div class="Bar"></div>
            </div>
        </div>
    </div>


    <script src="./script.js"></script>
</body>

</html>
